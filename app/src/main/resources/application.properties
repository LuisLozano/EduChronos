# Fase 6, Bloque 1 - persistencia de humo.
#
# Ruta del fichero SQLite RELATIVA al working dir (no /tmp, no ruta absoluta),
# pensando en el empaquetado portable Windows de Fase 11. El driver Xerial no
# crea directorios padre, por eso el .db vive en la raiz del working dir.
spring.datasource.url=jdbc:sqlite:educhronos.db
spring.datasource.driver-class-name=org.sqlite.JDBC

# Hibernate genera el esquema (hbm2ddl). 'update' lo conserva entre arranques,
# que es justo lo que Fase 6 persigue (cerrar y reabrir sin perder datos).
# Nada de Flyway en este bloque.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
