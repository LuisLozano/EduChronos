# Fase 6, Bloque 1 - persistencia de humo.
#
# Ruta del fichero SQLite RELATIVA al working dir (no /tmp, no ruta absoluta),
# pensando en el empaquetado portable Windows de Fase 11. El driver Xerial no
# crea directorios padre, por eso el .db vive en la raiz del working dir.
spring.datasource.url=jdbc:sqlite:educhronos.db
spring.datasource.driver-class-name=org.sqlite.JDBC

# El esquema lo gobierna schema.sql (Bloque 8.5-C2a-DDL), NO Hibernate: ddl-auto
# =none. 'validate' está roto en el community SQLiteDialect 7.4.1 (valida la PK
# esperando bigint y la crea integer), por eso 'none' y no 'validate'. Nada de
# Flyway (esquema casi estático, una BD por centro).
spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect

# Ejecuta classpath:schema.sql en cada arranque. 'always' porque SQLite no se
# detecta como BD embebida y el modo por defecto ('embedded') no lo correría.
# schema.sql dropea y recrea: el esquema queda gobernado por el fichero.
spring.sql.init.mode=always
