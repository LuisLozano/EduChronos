# Config de test (Fase 6, Bloque 1). BD propia para no pisar la de desarrollo;
# el test verifica que este fichero se crea en disco y lo limpia al terminar.
spring.datasource.url=jdbc:sqlite:educhronos-test.db
spring.datasource.driver-class-name=org.sqlite.JDBC

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
