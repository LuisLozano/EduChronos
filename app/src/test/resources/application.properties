# Config de test (Fase 6, Bloque 1). BD propia para no pisar la de desarrollo;
# el test verifica que este fichero se crea en disco y lo limpia al terminar.
spring.datasource.url=jdbc:sqlite:educhronos-test.db
spring.datasource.driver-class-name=org.sqlite.JDBC

# Igual que produccion (8.5-C2a-DDL): el esquema lo gobierna schema.sql, no
# Hibernate. ddl-auto=none + spring.sql.init corriendo schema.sql en cada
# contexto. schema.sql dropea y recrea, de modo que varios contextos Spring
# sobre este mismo fichero de test recrean el esquema con FK sin petar.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.sql.init.mode=always
